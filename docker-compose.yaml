version: '3.9'
services:
  watering-web-frontend:
    image: 127.0.0.0:5000/watering-web-frontend-demo:v0.0.1
    ports:
      - "44080:80"
    deploy:
      placement:
        constraints:
            - node.role == worker
            - node.hostname != CB-Mass-Node1
    networks:
      - BIG-dataplatform-network
  
  watering-web-backend:
    image: 127.0.0.0:5000/watering-web-backend-demo:v0.0.1
    ports:
      - "8082:8082"
    deploy:
      placement:
        constraints:
          - node.role == worker
          - node.hostname != CB-Mass-Node1
    networks:
      - BIG-dataplatform-network

networks:
  BIG-dataplatform-network:
    external: true
    name: BIG-dataplatform-network