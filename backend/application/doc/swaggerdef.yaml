components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:

    DataResponse:
      type: object
      properties:
        values:
          type: array
          items:
            $ref: '#/components/schemas/DataValue'

    DataValue:
      type: object
      properties:
        source:
          type: string
        refStructureName:
          type: string
        companyName:
          type: string
        fieldName:
          type: string
        plant:
          $ref: '#/components/schemas/PlantDto'
        measures:
          type: array
          items:
            oneOf:
              - $ref: '#/components/schemas/MeasureData'
              - $ref: '#/components/schemas/HumidityBinMeasureData'

    MeasureData:
      type: object
      properties:
        detectedValueTypeDescription:
          type: string
        timestamp:
          type: string
        value:
          type: number

    HumidityBinMeasureData:
      type: object
      properties:
        humidityBin:
          type: number
        timestamp:
          type: string
        count:
          type: number

    ColtureDto:
      type: object
      required:
        - colture
        - coltureType
      properties:
        colture:
          type: string
        coltureType:
          type: string

    PlantDto:
      type: object
      required:
        - plantId
        - sectorName
        - plantRow
        - plantName
        - colture
      properties:
        plantId:
          type: integer
        sectorName:
          type: string
        plantrow:
          type: string
        plantName:
          type: string
        colture:
          type: string

    ThesisDto:
      allOf:
        - $ref: '#/components/schemas/ThesisIdentifier'
        - properties:
            dripperPosition:
                type: number
            timestampFrom:
                type: number
    
    WateringSectorDetails:
      type: object
      properties:
        advice:
          type: boolean
        prescriptive:
          type: boolean
        dripperCapacity:
          type: number
        dripperScalingFactor:
          type: number
        sprinklerCapacity:
          type: number
        valveId:
          type: string
        prescriptiveThesis:
          type: string
        timestampFrom:
          type: number

    UserTokenRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
        affiliation:
          type: string
        auth_type:
          type: string

    UserTokenResponse:
      type: object
      properties:
        token:
          type: string

    RegisterUsersDto:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: '#/components/schemas/RegisterUserDto'

    RegisterUserDto:
      type: object
      properties:
        username:
          type: string
        name:
          type: string
        password:
          type: string
        authType:
          type: string

    UserGrantsDto:
      type: object
      properties:
        grants:
          type: array
          items:
            $ref: '#/components/schemas/UserGrantDto'

    UserGrantDto:
      type: object
      properties:
        source:
          type: string
        refStructureName:
          type: string
        companyName:
          type: string
        fieldName:
          type: string
        sectorName:
          type: string
        plantRow:
          type: string
        permits:
          type: array
          items:
            type: string
        username:
          type: string

    OptStateDto:
      type: object
      properties:
        source:
          type: string
        refStructureName:
          type: string
        companyName:
          type: string
        fieldName:
          type: string
        sectorName:
          type: string
        plantRow:
          type: string
        validFrom:
          type: string
        validTo:
          type: string
        optimalState:
          type: array
          items:
            $ref: '#/components/schemas/MatrixData'

    MatrixData:
      type: object
      properties:
        xx:
          type: number
        yy:
          type: number
        zz:
          type: number
        optValue:
          type: number
        weight:
          type: number

    SensorDto:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
        xx:
          type: number
        yy:
          type: number
        zz:
          type: number

    UserFieldPermissions:
      type: object
      properties:
        user:
          type: string
        affiliation:
          type: string
        role:
          type: string
        fields:
          type: array
          items:
            $ref: '#/components/schemas/UserFieldPermission'

    UserFieldPermission:
      allOf:
        - $ref: '#/components/schemas/ThesisIdentifier'
        - type: object
          properties:
            permissions:
              type: array
              items:
                type: string
    
    ThesisIdentifier:
      type: object
      properties:
        source:
          type: string
        refStructureName:
          type: string
        companyName:
          type: string
        fieldName:
          type: string
        sectorName:
          type: string
        plantRow:
          type: string

    WateringEventDto:
      type: object
      properties:
        plantRow: 
          type: string
        date: 
          type: string
          format: date
        wateringStart:
          type: string
        wateringEnd:
          type: string
        duration:
          type: number
        enabled:
          type: boolean
        expectedWater:
          type: number
        advice:
          type: number
        adviceTimestamp:
          type: string
        updatedBy: 
          type: string
        updateTimestamp:
          type: string
        note:
          type: string

    WateringAdviceDto:
      allOf:
        - $ref: '#/components/schemas/ThesisIdentifier'
        - type: object
          properties:
            advice:
              type: number
            computedOn:
              type: number
            duration:
              type: number
            wateringStart:
              type: number
            wateringEnd:
              type: number
            r: 
              type: number
            ki:
              type: number
            kp:
              type: number
            lastIrrigation:
              type: number
    
    WateringScheduleResponse:
      allOf:
        - $ref: '#/components/schemas/ThesisIdentifier'
        - type: object
          properties:
            events:
              type: array
              items:
                $ref: '#/components/schemas/WateringEventDto'
    
    WateringEventUpdateRequest:
      allOf:
        - $ref: '#/components/schemas/ThesisIdentifier'
        - $ref: '#/components/schemas/WateringEventDto'
    
    WateringBaseline:
      type: object
      properties:
        maxIrrigation:
          type: number
        irrigationBaseline:
          type: number
        wateringHour:
          type: string
          format: time
        irrigationFrequency:
          type: number
        ki:
          type: number
        kp:
          type: number
        timestampFrom:
          type: number
    
    SetPrescriptiveThesisRequest:
      type: object
      properties:
        prescriptiveThesis:
          type: string
    
    LogDto:
      type: object
      properties:
        source:
          type: string
        refStructureName:
          type: string
        companyName:
          type: string
        fieldName:
          type: string
        sectorName:
          type: string
        plantRow:
          type: string
        timestamp:
          type: number
        type:
          type: string
        description:
          type: string
    