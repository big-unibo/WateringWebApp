components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      
  schemas:
    UserTokenRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string

    UserTokenResponse:
      type: object
      properties:
        token:
          type: string

    CreateCompany:
      type: object
      required:
        - companyName
        - organizationId
      properties:
        companyName:
          type: string
          description: Name of the company
        organizationId:
          type: integer
          description: ID of the organization to associate

    GeoPoint:
      type: object
      description: Geographical location in GeoJSON Point format
      required:
        - type
        - coordinates
      properties:
        type:
          type: string
          enum: [Point]
          description: Must be "Point" for GeoJSON
        coordinates:
          type: array
          description: [longitude, latitude]
          items:
            type: number
          minItems: 2
          maxItems: 2

    CreateField:
      type: object
      required:
        - fieldName
        - companyId
      properties:
        fieldName:
          type: string
          description: Name of the field
        companyId:
          type: integer
          description: ID of the company to associate the field with
        location:
          $ref: '#/components/schemas/GeoPoint'

    CreateSector:
      type: object
      required:
        - sectorName
        - culture
      properties:
        sectorName:
          type: string
          description: Name of the sector
        culture:
          type: string
          description: Main culture of the sector
        cultureType:
          type: string
          description: Optional type of the culture
        location:
          $ref: '#/components/schemas/GeoPoint'
        prescriptive:
          type: boolean
          description: Optional prescriptive flag
        advice:
          type: boolean
          description: Optional advice flag
        dripperCapacity:
          type: number
          format: double
          description: Optional dripper capacity 
          example: 1.5
        sprinklerCapacity:
          type: number
          format: double
          description: Optional sprinkler capacity 
        doubleWing:
          type: boolean
          description: Optional double wing flag

    CreateThesis:
      type: object
      required:
        - thesisName
      properties:
        thesisName:
          type: string
          description: Name of the thesis
        validFrom: 
          type: number
          description: Optional timestamp of thesis validity start (Seconds elapsed since 01/01/1970 - 00:00 )

    CreateSignal:
      type: object
      required:
        - typeId
        - x
        - y
        - z
      properties:
        typeId:
          type: integer
          description: Signal type ID
        description:
          type: string
          description: Optional signal description
        x:
          type: number
          description: Signal x coordinate
        y:
          type: number
          description: Signal y coordinate
        z:
          type: number
          description: Signal z coordinate
        virtual:
          type: boolean
          descriptio: True if it's virtual
        unit:
          type: string
          description: Measurement unit of the signal 
        idOnProvider:
          type: string
          description: Id on provider
        sensorTechnology:
          type: string
          description: Sensor technology

    UpdateSignal:
      type: object
      properties:
        description:
          type: string
          description: Signal description
        idOnProvider:
          type: string
          description: Signal id for the provider
        sensorTechnology:
          type: string
          description: Sensor technology

    CreateDevice:
      type: object
      required:
        - type
        - providerId
        - location
        - signals
      properties:
        type:
          type: string
          description: Type of the device
        providerId:
          type: integer
          description: ID of the provider
        description:
          type: string
          description: Optional description of the device
        location:
          $ref: '#/components/schemas/GeoPoint'
        signals:
          type: array
          description: Array of signals associated with the device
          items:
            $ref: '#/components/schemas/CreateSignal'
    
    SignalTargetType:
      type: string
      enum:
        - field
        - sector
        - thesis

    SignalAssociation:
      type: object
      required:
        - targetId
        - targetType
      properties:
        targetId:
          type: integer
          description: Id of the signal target 
        targetType:
          $ref: '#/components/schemas/SignalTargetType'
          description: Type of the target entity
        validFrom: 
          type: number
          description: Optional timestamp of association validity start (Seconds elapsed since 01/01/1970 - 00:00 )

    Measurement:
      type: object
      required: 
        - timestamp
      properties:
        timestamp: 
          type: number
          description: Measurment timestamp (Seconds elapsed since 01/01/1970 - 00:00 )
        computed:
          type: boolean
          description: True if measurments is computed
        value:
          oneOf:
            - type: number
            - type: string
          description: Value measured, could be either a number or a string 
    
    addMeasurements:
      type: array
      items:
        $ref: "#/components/schemas/Measurement"
    
    AggregationType:
      type: string
      enum:
        - SUM
        - AVG
        - MIN
        - MAX
        - MED

    SignalsDataResponse:
      type: array
      items:
        $ref: "#/components/schemas/SignalTypeData"

    SignalTypeData:
      type: object
      properties: 
        thesisName:
          type: string
          description: Thesis name
        signalType:
          type: string
          description: Signal Type
        signalTypeDescription:
          type: string
          description: Signal Type description
        signals:
          type: array
          items:
            $ref: "#/components/schemas/SignalData"
    
    SignalData:
      type: object
      properties: 
        signalId:
          type: number
          description: Signal id
        deviceId:
          type: number
          description: Device id
        signalDescription:
          type: string
          description: Signal description
        x:
          type: integer
          description: x coordinate
        y:
          type: integer
          description: y coordinate
        z:
          type: integer
          description: z coordinate
        virtual:
          type: boolean
          description: True if the sensor is virtual
        unit:
          type: string
          description: Scale unit
        measurements:
          type: array
          items:
            $ref: "#/components/schemas/MeasurementData"

    MeasurementData:
      type: object
      properties:
        timestamp: 
          type: number
          description: Measurement timestamp (Seconds elapsed since 01/01/1970 - 00:00 )
        computed:
          type: boolean
          description: true if the measurement is computed.
        value:
          description: Either a numeric value rappresenting the aggregation of the measurements values or an array of raw_values as strings
          oneOf:
            - type: number
              format: double
            - type: array
              items:
                type: string
    
    InterpolatedDataResponse:
      type: object
      properties:
        thesisName:
          type: string
          description: Thesis name
        deviceId:
          type: number
          description: Id of the GRID type device assigned to the thesis
        images:
          type: array
          items:
            $ref: "#/components/schemas/InterpolatedImageData"

    InterpolatedImageData:
      type: object
      properties:
        timestamp:
          type: number
          description: Measurement timestamp (Seconds elapsed since 01/01/1970 - 00:00 )
        image:
          type: array
          items:
            $ref: "#/components/schemas/InterpolatedMeasurementData"

    InterpolatedMeasurementData:
      type: object
      properties:
        x: 
          type: number
          description: x coordinate of the meaasurement.
        y: 
          type: number
          description: y coordinate of the meaasurement.
        z: 
          type: number
          description: x coordinate of the meaasurement.
        value: 
          type: number
          description: cell value.
    
    HumidtyBinsDataResponse:
      type: object
      properties:
        thesisName:
          type: string
          description: Thesis name
        deviceId:
          type: number
          description: Id of the GRID type device assigned to the thesis
        measures:
          type: array
          items:
            $ref: "#/components/schemas/HumidtyBinMeasureData"
      
    HumidtyBinMeasureData:
      type: object
      properties:
        humidityBin:
          type: number
          description: Humidty bin number
        humidityBinDescription:
          type: string
          description: String describing the humidty bin range
        timestamp:
          type: number
          description: Timestamp of the humidty bin measures
        count:
          type: number
          description: Count of the measurements taken resulting for the bin
    
    SectorDataDto:
      type: object
      properties:
        sectorId:
          type: number
          description: Id of the sector
        sectorName:
          type: string
          description: Name of the sector
        culture:
          type: string
          description: Culture type in the sector
        cultureType:
          type: string
          description: Type of culture
        location:
          type: string
          description: Sector location
          nullable: true
        prescriptive:
          type: string
          description: Prescriptive notes
          nullable: true
        advice:
          type: string
          description: Advice related to the sector
          nullable: true
        dripperCapacity:
          type: number
          description: Dripper capacity
          nullable: true
        sprinklerCapacity:
          type: number
          description: Sprinkler capacity
          nullable: true
        doubleWing:
          type: boolean
          description: Indicates if double wing is used
          nullable: true
        fieldId:
          type: number
          description: Id of the field the sector belongs to
        fieldName:
          type: string
          description: Name of the field
          nullable: true
        fieldLocation:
          type: string
          description: Location of the field
          nullable: true
        companyId:
          type: number
          description: Id of the company owning the field
        companyName:
          type: string
          description: Name of the company
          nullable: true
        organizationId:
          type: number
          description: Id of the organization the company belongs to
        organizationName:
          type: string
          description: Name of the organization
          nullable: true
        theses:
          type: array
          description: List of theses associated to the sector
          items:
            $ref: "#/components/schemas/ThesisRefDto"

    ThesisRefDto:
      type: object
      properties:
        id:
          type: number
          description: Id of the thesis
        name:
          type: string
          description: Name of the thesis





